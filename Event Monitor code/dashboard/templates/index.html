<!DOCTYPE html>
<html>
<head>
    <title>Data Center Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            background:
                radial-gradient(circle at 20% 20%, rgba(59,130,246,0.2), transparent),
                radial-gradient(circle at 80% 80%, rgba(168,85,247,0.2), transparent),
                #020617;
        }

        .sidebar {
            width: 84px;
            background: rgba(15,23,42,0.9);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            border-right: 1px solid rgba(255,255,255,0.08);
        }

        .nav-btn {
            margin: 14px 0;
            font-size: 22px;
            width: 52px;
            height: 52px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            color: white;
            background: rgba(30,41,59,0.5);
            transition: 0.25s;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: rgba(59,130,246,0.35);
            box-shadow: 0 0 16px rgba(59,130,246,0.5);
        }

        .main {
            flex: 1;
            padding: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: rgba(30,41,59,0.4);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow:
                0 0 10px rgba(59,130,246,0.3),
                0 0 30px rgba(168,85,247,0.2);
        }

        .large { grid-column: span 2; }
        .full { grid-column: span 3; }

        .big {
            font-size: 26px;
            font-weight: bold;
        }

        h1 {
            margin-top: 0;
            text-shadow: 0 0 10px rgba(59,130,246,0.7);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }

        tr:hover {
            background: rgba(59,130,246,0.1);
        }

        .duplicate {
            background: rgba(220,38,38,0.2);
        }

        .badge {
            padding: 6px 12px;
            border-radius: 10px;
            display: inline-block;
            min-width: 74px;
            text-align: center;
        }

        .ok {
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        .dup {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        select {
            margin-bottom: 10px;
            background: rgba(30,41,59,0.6);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .muted {
            opacity: 0.75;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .mini-stat {
            font-size: 20px;
            margin-top: 10px;
        }

        canvas {
            width: 100% !important;
            height: 280px !important;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="nav-btn active" onclick="showSection('dashboard', this)">🏠</button>
        <button class="nav-btn" onclick="showSection('logs', this)">📄</button>
        <button class="nav-btn" onclick="showSection('analytics', this)">📊</button>
    </div>

    <div class="main">
        <h1>🖥 Data Center Dashboard</h1>
        <p class="muted">Real-Time Pub/Sub Monitoring</p>

        <!-- DASHBOARD -->
        <div id="dashboard" class="section active">
            <div class="grid">
                <div class="card">
                    <h3>Total Events</h3>
                    <div class="big" id="total">0</div>
                </div>

                <div class="card">
                    <h3>Duplicates</h3>
                    <div class="big" id="dups">0</div>
                </div>

                <div class="card">
                    <h3>Average Temp</h3>
                    <div class="big" id="avg">--</div>
                </div>

                <div class="card large">
                    <h3>System Activity</h3>
                    <canvas id="tempChart"></canvas>
                </div>

                <div class="card">
                    <h3>Status</h3>
                    <p style="color:#22c55e;">System Running</p>
                    <div class="mini-stat" id="latestReading">Waiting for data...</div>
                </div>
            </div>
        </div>

        <!-- LOGS -->
        <div id="logs" class="section">
            <div class="card full">
                <h3>Event Log</h3>

                <select id="filter" onchange="applyFilter()">
                    <option value="all">All Events</option>
                    <option value="dup">Duplicates Only</option>
                    <option value="ok">Unique Only</option>
                </select>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Device</th>
                            <th>Temp</th>
                            <th>Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ANALYTICS -->
        <div id="analytics" class="section">
            <div class="analytics-grid">
                <div class="card">
                    <h3>Duplicate Rate</h3>
                    <div class="big" id="dupRate">0%</div>
                </div>

                <div class="card">
                    <h3>Latest Device</h3>
                    <div class="big" id="latestDevice">--</div>
                </div>

                <div class="card">
                    <h3>Latest Temperature</h3>
                    <div class="big" id="latestTemp">--</div>
                </div>

                <div class="card">
                    <h3>Last Update Time</h3>
                    <div class="big" id="lastTime">--</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allEvents = [];
        let tempChart = null;

        function showSection(sectionId, btn) {
            document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
            document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));

            document.getElementById(sectionId).classList.add("active");
            btn.classList.add("active");
        }

        async function loadMetrics() {
            const res = await fetch('/api/metrics');
            const data = await res.json();

            document.getElementById("total").innerText = data.total;
            document.getElementById("dups").innerText = data.dups;
            document.getElementById("avg").innerText = data.avg_temp + " °C";

            const dupRate = data.total > 0 ? ((data.dups / data.total) * 100).toFixed(1) : 0;
            document.getElementById("dupRate").innerText = dupRate + "%";
        }

        async function loadChart() {
            const res = await fetch('/api/chart-data');
            const data = await res.json();

            const canvas = document.getElementById('tempChart');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');

            if (tempChart) {
                tempChart.destroy();
            }

            tempChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Temp °C',
                        data: data.temps,
                        borderColor: 'rgba(59,130,246,1)',
                        backgroundColor: 'rgba(59,130,246,0.2)',
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: 'white' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: 'white' },
                            grid: { color: 'rgba(255,255,255,0.08)' }
                        },
                        y: {
                            ticks: { color: 'white' },
                            grid: { color: 'rgba(255,255,255,0.08)' }
                        }
                    }
                }
            });
        }

        async function loadData() {
            const res = await fetch('/api/events');
            allEvents = await res.json();
            render(allEvents);
            updateAnalytics();
        }

        function render(data) {
            let html = "";

            data.forEach(e => {
                html += `
                <tr class="${e.duplicate ? 'duplicate' : ''}">
                    <td>${e.id}</td>
                    <td>${e.device_id || '--'}</td>
                    <td>${e.temp} °C</td>
                    <td>${e.time}</td>
                    <td>
                        <span class="badge ${e.duplicate ? 'dup' : 'ok'}">
                            ${e.duplicate ? 'Duplicate' : 'OK'}
                        </span>
                    </td>
                </tr>`;
            });

            document.getElementById("tableBody").innerHTML = html;
        }

        function updateAnalytics() {
            if (!allEvents.length) return;

            const latest = allEvents[0];
            document.getElementById("latestDevice").innerText = latest.device_id || "--";
            document.getElementById("latestTemp").innerText = latest.temp + " °C";
            document.getElementById("lastTime").innerText = latest.time;
            document.getElementById("latestReading").innerText = `${latest.temp} °C @ ${latest.time}`;
        }

        function applyFilter() {
            let val = document.getElementById("filter").value;

            if (val === "dup") {
                render(allEvents.filter(e => e.duplicate));
            } else if (val === "ok") {
                render(allEvents.filter(e => !e.duplicate));
            } else {
                render(allEvents);
            }
        }

        async function refreshAll() {
            await Promise.all([
                loadMetrics(),
                loadData(),
                loadChart()
            ]);
        }

        document.addEventListener("DOMContentLoaded", () => {
            refreshAll();
            setInterval(refreshAll, 4000);
        });
    </script>
</body>
</html>
