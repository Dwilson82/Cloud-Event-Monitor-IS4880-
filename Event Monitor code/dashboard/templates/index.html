<!DOCTYPE html>
<html>
<head>
    <title>Data Center Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            background:
                radial-gradient(circle at 20% 20%, rgba(59,130,246,0.2), transparent),
                radial-gradient(circle at 80% 80%, rgba(168,85,247,0.2), transparent),
                #020617;
        }

        .sidebar {
            width: 84px;
            background: rgba(15,23,42,0.9);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            border-right: 1px solid rgba(255,255,255,0.08);
        }

        .nav-btn {
            margin: 14px 0;
            font-size: 22px;
            width: 52px;
            height: 52px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            color: white;
            background: rgba(30,41,59,0.5);
            transition: 0.25s;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: rgba(59,130,246,0.35);
            box-shadow: 0 0 16px rgba(59,130,246,0.5);
        }

        .main {
            flex: 1;
            padding: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: rgba(30,41,59,0.4);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow:
                0 0 10px rgba(59,130,246,0.3),
                0 0 30px rgba(168,85,247,0.2);
        }

        .large { grid-column: span 2; }
        .full { grid-column: span 3; }

        .big {
            font-size: 26px;
            font-weight: bold;
        }

        h1 {
            margin-top: 0;
            text-shadow: 0 0 10px rgba(59,130,246,0.7);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }

        tr:hover {
            background: rgba(59,130,246,0.1);
        }

        .duplicate {
            background: rgba(220,38,38,0.2);
        }

        .badge {
            padding: 6px 12px;
            border-radius: 10px;
            display: inline-block;
            min-width: 74px;
            text-align: center;
        }

        .ok {
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        .dup {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        .warn {
            background: #f59e0b;
            box-shadow: 0 0 10px #f59e0b;
        }

        select, input {
            margin-bottom: 10px;
            background: rgba(30,41,59,0.6);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .muted {
            opacity: 0.75;
        }

        .analytics-grid,
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .mini-stat {
            font-size: 20px;
            margin-top: 10px;
        }

        canvas {
            width: 100% !important;
            height: 280px !important;
        }

        .status-text {
            font-size: 28px;
            font-weight: bold;
        }

        .settings-actions {
            margin-top: 10px;
        }

        .save-btn {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            cursor: pointer;
        }

        .save-btn:hover {
            background: #1d4ed8;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<!-- SNIPPED FOR BREVITY — NO STRUCTURAL CHANGES ABOVE -->

<script>
    async function loadMetrics() {
        const res = await fetch('/api/metrics');
        const data = await res.json();
        document.getElementById("avg").innerText = data.avg_temp_f + " °C";
    }

    async function loadStatus() {
        const res = await fetch('/api/status');
        const data = await res.json();
        document.getElementById("latestReading").innerText =
            `${data.device_id} • ${data.latest_temp_f ?? '--'} °C @ ${data.time}`;
    }

    async function loadSettings() {
        const res = await fetch('/api/settings');
        const data = await res.json();

        document.getElementById("currentRules").innerText =
            `Warning: ${data.warning_temp_f} °C | Critical: ${data.critical_temp_f} °C | Alerts: ${data.alert_enabled ? 'On' : 'Off'}`;
    }

        });

    }
</script>

</body>
</html>
